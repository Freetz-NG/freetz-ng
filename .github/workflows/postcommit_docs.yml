name: postcommit_docs

on:
  push:
    branches: [ master ]
    paths:
      - '.github/workflows/postcommit_docs.yml'
      - 'docs/generate.sh'
      - 'docs/*/generate.sh'
      - '!docs/stats/generate.sh'
      - 'make/host-tools/*/*.mk'
      - 'make/pkgs/*/Config.in'
      - 'make/pkgs/*/*.mk'
      - 'make/libs/*/Config.in'
      - 'make/libs/*/*.mk'
      - 'config/ui/patches.in'
      - 'config/ui/firmware.in'
      - 'docs/*/*.md'
      - 'docs/wiki/*/*.md'
      - 'docs/screenshots/*.png'
      - 'docs/screenshots/*.jpg'
      - 'docs/screenshots/*.gif'
      - 'docs/prerequisites/*.tpl'
      - 'tools/.prerequisites/*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      packages: read
      contents: write
    runs-on: ubuntu-24.04
    if: github.repository == 'freetz-ng/freetz-ng'

    steps:

      - name: dependencies-check
        run: |
          for cmd in git locales imagemagick; do
            if apt list --installed 2>/dev/null | grep -q "^$cmd/"
            then
              echo "$cmd is installed"
            else
              echo "$cmd is NOT installed" && MISSING_PACKAGES="$MISSING_PACKAGES $cmd"
            fi
          done
          if [ -n "$MISSING_PACKAGES" ]; then
            echo "The following packages are missing: $MISSING_PACKAGES"
            echo "Installing missing packages..."
            sudo apt-get -qq update && DEBIAN_FRONTEND=noninteractive sudo apt-get -y install $MISSING_PACKAGES
          fi

      - name: locale
        run: sudo $SHELL -c "locale-gen en_US.utf8 && locale-gen de_DE.UTF-8 && update-locale"

      - name: clone
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          set-safe-directory: true
          repository: ${{ github.repository }}
          ref: ${{ github.ref_name }}
          path: ${{ github.workspace }}
          fetch-depth: 0
          clean: false
          persist-credentials: true

      - name: generate
        run: |
          export LANG=en_US.utf8
          docs/generate.sh

      - name: commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git pull || exit
          git add .
          git status
          git config --local user.name github-actions[bot]
          git config --local user.email github-actions[bot]@users.noreply.github.com
          git diff --cached --quiet && exit 0 || git commit -m "docs: automatic update"
          git config --local credential.helper '!x() { echo "password=$GITHUB_TOKEN"; };x'
          git push origin $GITHUB_REF_NAME


