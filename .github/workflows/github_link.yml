name: github_link

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/CHANGELOG.md'
# workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      packages: read
      contents: write
    runs-on: ubuntu-24.04
    if: github.repository == 'freetz-ng/freetz-ng'

    steps:

      - name: dependencies-check
        run: |
          for cmd in git locales netcat-openbsd curl bsdmainutils xxd libarchive-zip-perl; do
            if apt list --installed 2>/dev/null | grep -q "^$cmd/"
            then
              echo "$cmd is installed"
            else
              echo "$cmd is NOT installed" && MISSING_PACKAGES="$MISSING_PACKAGES $cmd"
            fi
          done
          if [ -n "$MISSING_PACKAGES" ]; then
            echo "The following packages are missing: $MISSING_PACKAGES"
            echo "Installing missing packages..."
            sudo apt-get -qq update && DEBIAN_FRONTEND=noninteractive sudo apt-get -y install $MISSING_PACKAGES
          fi

      - name: locale
        run: sudo $SHELL -c "locale-gen en_US.utf8 && locale-gen de_DE.UTF-8 && update-locale"

      - name: clone
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          set-safe-directory: true
          repository: ${{ github.repository }}
          ref: ${{ github.ref_name }}
          path: ${{ github.workspace }}
          fetch-depth: 0
          clean: false
          persist-credentials: true

      - name: generate
        id: generate
        run: |
          PKG="$(git log --format=%B -n1 ${{ github.sha }} | sed -nr 's/^(add|bump) ([^ ,]*).*/\2/p')"
          [ -z "$PKG" ] && echo "No add or bump." && exit
          echo "pkg=$PKG" >> $GITHUB_OUTPUT
          PKG="$(echo "$PKG" | tr '[:upper:]' '[:lower:]')"
          TYPE=""
          for x in make libs host-tools; do [ -e docs/$x/$PKG.md ] && TYPE=$x; done
          [ -z "$TYPE" ] && echo -n 'Waiting ' && for x in $(seq 60); do echo -n '.' && sleep 1; done && echo ' done.' && git pull
          for x in make libs host-tools; do [ -e docs/$x/$PKG.md ] && TYPE=$x; done
          [ -z "$TYPE" ] && PKG=$PKG-host
          for x in make libs host-tools; do [ -e docs/$x/$PKG.md ] && TYPE=$x; done
          [ -z "$TYPE" ] && echo "No page." && exit
          LINK="https://freetz-ng.github.io/freetz-ng/$TYPE/#$PKG"
          LINK="https://freetz-ng.github.io/freetz-ng/$TYPE/$PKG"
          echo "link=$LINK" >> $GITHUB_OUTPUT
          echo "################################################################" && bash -c "echo LINK=$LINK"

      - name: comment
        if: "contains(steps.generate.outputs.link, 'http')"
        uses: peter-evans/commit-comment@v4
        with:
          sha: ${{ github.sha }}
          body: |
            See for infos about ${{ steps.generate.outputs.pkg }} and maybe a changelog link:
            ${{ steps.generate.outputs.link }}


